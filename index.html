<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Shadow CIA | Secure System</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  font-family: monospace;
  color:#00ff9d;
}

/* Canvas Matrix */
#matrixCanvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* الموقع */
.container {
  max-width:800px;
  margin:auto;
  padding:20px;
  position:relative;
  z-index:10;
}

/* نافذة typing hack */
#hackScreen {
  background: rgba(0,0,0,0.8);
  border:1px solid #00ff9d;
  padding:10px;
  height:150px;
  overflow-y:auto;
  font-size:14px;
  margin-bottom:10px;
}

/* Inputs */
input, textarea {
  width:100%;
  padding:10px;
  margin-top:5px;
  background:#111;
  border:1px solid #00ff9d40;
  color:#00ff9d;
}

button {
  margin-top:10px;
  padding:10px;
  background:#00ff9d;
  border:none;
  cursor:pointer;
}

.timer {
  text-align:center;
  color:red;
  font-size:20px;
  margin-bottom:10px;
}

/* شريط نيون */
#neonBar {
  width: 100%;
  height: 8px;
  background:#111;
  border-radius:5px;
  overflow:hidden;
  margin-top:5px;
}

#neonFill {
  width: 0%;
  height:100%;
  background: linear-gradient(90deg, #00ff9d, #00ffff, #00ff9d);
  animation: neonGlow 1.5s infinite alternate;
}

@keyframes neonGlow {
  0%{filter: brightness(1);}
  50%{filter: brightness(1.8);}
  100%{filter: brightness(1);}
}
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="container" id="main">
  <div id="hackScreen"></div>
  <div class="timer" id="timer">Time: 10:00</div>
  <div id="neonBar"><div id="neonFill"></div></div>

  <form id="form">
    <label>1. الاسم + العمر + عدد ساعات تواجدك يوميًا:</label><textarea required></textarea>
    <label>2. اذكر خبراتك السابقة (أمنية / عصابات / قيادية):</label><textarea required></textarea>
    <label>3. لماذا تريد الانضمام إلى Shadow CIA تحديدًا؟</label><textarea required></textarea>
    <label>4. هل تتعهد بعدم تسريب أي معلومات أو خيانة القطاع مهما كانت الظروف؟</label><textarea required></textarea>
    <label>5. لو طُلب منك تنفيذ أمر يخدم الدولة لكنه مخالف للقانون، هل توافق؟ ولماذا؟</label><textarea required></textarea>
    <label>6. تم القبض عليك وعُرضت عليك الحرية مقابل معلومات سرية، ماذا ستفعل؟</label><textarea required></textarea>
    <label>7. اكتشفت عضو داخل الجهاز يسرب معلومات، كيف تتصرف؟</label><textarea required></textarea>
    <label>8. لو تعارضت مصلحتك الشخصية مع أوامر القيادة، ماذا تختار؟ ولماذا؟</label><textarea required></textarea>
    <label>9. ما الذي يجعلك أفضل من غيرك للانضمام لهذا الجهاز؟</label><textarea required></textarea>
    <label>ايديك سوني ؟</label><input required>
    <label>يوزرك دس:</label><input required>
    <button type="button" onclick="preview()">مراجعة قبل الإرسال</button>
  </form>
</div>

<div id="previewBox" style="display:none; padding:20px;">
  <h2>تأكيد البيانات</h2>
  <pre id="previewText"></pre>
  <button onclick="send()">إرسال نهائي</button>
</div>

<audio id="typingSound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>
<audio id="hackingSound" src="https://www.soundjay.com/mechanical/keyboard-1.mp3" loop></audio>

<script>
// Matrix Background
const canvas = document.getElementById("matrixCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890@#$%^&*()*&^%";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = [];
for(let x=0; x<columns; x++) drops[x]=1;

function drawMatrix(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#00ff9d";
  ctx.font = fontSize + "px monospace";
  for(let i=0;i<drops.length;i++){
    const text = letters.charAt(Math.floor(Math.random()*letters.length));
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);
    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i]=0;
    drops[i]++;
  }
}
setInterval(drawMatrix,33);

// Hacking Typing Effect + beep
const hackScreen = document.getElementById("hackScreen");
const typingSound = document.getElementById("typingSound");
const hackingSound = document.getElementById("hackingSound");
hackingSound.play();

function hackTyping(){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890@#$%^&*()*&^%";
  let line = "";
  for(let i=0;i<Math.floor(Math.random()*50+20);i++){
    line += chars.charAt(Math.floor(Math.random()*chars.length));
  }
  hackScreen.innerText += line + "\n";
  hackScreen.scrollTop = hackScreen.scrollHeight;
  typingSound.currentTime=0;
  typingSound.play();
}
setInterval(hackTyping, 500);

// عداد 10 دقائق + شريط نيون
function startTimer(){
  let time = 600;
  const neon = document.getElementById("neonFill");
  let t = setInterval(()=>{
    time--;
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;
    if(seconds < 10) seconds = "0"+seconds;
    document.getElementById("timer").innerText="Time: "+minutes+":"+seconds;
    let percent = ((600 - time)/600)*100;
    neon.style.width = percent+"%";
    if(time <= 0){
      clearInterval(t);
      hackingSound.pause();
      alert("انتهى الوقت!");
      location.reload();
    }
  },1000);
}
startTimer();

// مراجعة
function preview(){
  const inputs = document.querySelectorAll("textarea,input");
  let text = "";
  for(let i=0;i<inputs.length;i++){
    if(!inputs[i].value){
      alert("لازم تعبي كل الحقول!");
      return;
    }
    text += "Q"+(i+1)+": "+inputs[i].value+"\n\n";
  }
  document.getElementById("main").style.display="none";
  document.getElementById("previewBox").style.display="block";
  document.getElementById("previewText").innerText=text;
}

// إرسال Embed
async function send(){
  const webhook = "https://discord.com/api/webhooks/1491730127027961878/StqAvvN1iG4qr-rO0OVo_rj44LG3rRdVCg86mlPEBjj3AQFUIW6KsL1AaDJ-uMaiPr6Y";
  const inputs = document.querySelectorAll("textarea,input");
  let embed = {title:"🕶️ Shadow CIA Application",color:0x00ff9d,fields:[]};
  inputs.forEach((el,i)=>embed.fields.push({name:"Q"+(i+1),value:el.value,inline:false}));
  await fetch(webhook,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({embeds:[embed]})});
  alert("تم الإرسال بنجاح ");
  location.reload();
}
</script>
</body>
</html>
