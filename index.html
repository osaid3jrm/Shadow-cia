<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Shadow CIA | Classified</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #050505;
  color: #00ff9d;
}

/* شاشة التحقق */
#auth {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#auth input {
  padding: 10px;
  margin-top: 10px;
  background: #111;
  border: 1px solid #00ff9d;
  color: #00ff9d;
}

#auth button {
  margin-top: 10px;
  padding: 10px 20px;
  background: #00ff9d;
  border: none;
  cursor: pointer;
}

/* شاشة تحميل */
#loader {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.bar {
  width: 300px;
  height: 8px;
  background: #111;
  margin-top: 15px;
}

.fill {
  height: 100%;
  width: 0%;
  background: #00ff9d;
}

/* الموقع */
.container {
  display: none;
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

form {
  background: #0b0b0b;
  padding: 20px;
  border-radius: 15px;
}

label {
  margin-top: 15px;
  display: block;
}

textarea, input {
  width: 100%;
  padding: 10px;
  background: #111;
  border: 1px solid #00ff9d40;
  color: #00ff9d;
}

button {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  background: #00ff9d;
  border: none;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- شاشة كود -->
<div id="auth">
  <h2>ENTER ACCESS CODE</h2>
  <input type="password" id="codeInput" placeholder="ادخل الكود">
  <button onclick="checkCode()">دخول</button>
</div>

<!-- تحميل -->
<div id="loader">
  <div>ACCESSING DATABASE...</div>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<!-- الموقع -->
<div class="container" id="main">
  <h1>Shadow CIA Application</h1>

  <form id="applicationForm">

    <label>1. الاسم + العمر + عدد ساعات تواجدك يوميًا:</label>
    <textarea></textarea>

    <label>2. اذكر خبراتك السابقة (أمنية / عصابات / قيادية):</label>
    <textarea></textarea>

    <label>3. لماذا تريد الانضمام إلى Shadow CIA تحديدًا؟</label>
    <textarea></textarea>

    <label>4. هل تتعهد بعدم تسريب أي معلومات أو خيانة القطاع مهما كانت الظروف؟</label>
    <textarea></textarea>

    <label>5. لو طُلب منك تنفيذ أمر يخدم الدولة لكنه مخالف للقانون، هل توافق؟ ولماذا؟</label>
    <textarea></textarea>

    <label>6. تم القبض عليك وعُرضت عليك الحرية مقابل معلومات سرية، ماذا ستفعل؟</label>
    <textarea></textarea>

    <label>7. اكتشفت عضو داخل الجهاز يسرب معلومات، كيف تتصرف؟</label>
    <textarea></textarea>

    <label>8. لو تعارضت مصلحتك الشخصية مع أوامر القيادة، ماذا تختار؟ ولماذا؟</label>
    <textarea></textarea>

    <label>9. ما الذي يجعلك أفضل من غيرك للانضمام لهذا الجهاز؟</label>
    <textarea></textarea>

    <label>ايديك سوني ؟</label>
    <input type="text">

    <label>يوزرك دس:</label>
    <input type="text">

    <button type="submit">إرسال</button>
  </form>
</div>

<!-- صوت -->
<audio id="hackSound" src="https://www.soundjay.com/mechanical/keyboard-1.mp3" loop></audio>

<script>
// الكود السري
const ACCESS_CODE = "911";

function checkCode() {
  const input = document.getElementById("codeInput").value;
  if (input === ACCESS_CODE) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("loader").style.display = "flex";
    document.getElementById("hackSound").play();

    let i = 0;
    let fill = document.getElementById("fill");

    let interval = setInterval(() => {
      i += 2;
      fill.style.width = i + "%";

      if (i >= 100) {
        clearInterval(interval);
        document.getElementById("loader").style.display = "none";
        document.getElementById("main").style.display = "block";
        document.getElementById("hackSound").pause();
      }
    }, 30);

  } else {
    alert("ACCESS DENIED");
  }
}

// إرسال Embed
const form = document.getElementById('applicationForm');
const webhookURL = "https://discord.com/api/webhooks/1491730127027961878/StqAvvN1iG4qr-rO0OVo_rj44LG3rRdVCg86mlPEBjj3AQFUIW6KsL1AaDJ-uMaiPr6Y";

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const inputs = form.querySelectorAll('textarea,input');

  const embed = {
    title: " Shadow CIA Application",
    color: 0x00ff9d,
    fields: []
  };

  inputs.forEach((el, i) => {
    embed.fields.push({
      name: `Q${i+1}`,
      value: el.value || "-",
      inline: false
    });
  });

  await fetch(webhookURL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      embeds: [embed]
    })
  });

  alert("تم إرسال التقديم ");
  form.reset();
});
</script>

</body>
</html>
