<style>
body {
  margin: 0;
  font-family: "Tahoma", sans-serif;
  background: #f0f0f0;
  color: #000;
}

/* شاشة التحميل */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
  color: #fff;
}

#loader img {
  max-width: 200px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.progress {
  font-size: 30px;
}

.bar {
  width: 80%;
  max-width: 300px;
  height: 10px;
  background: #444;
  margin-top: 15px;
  border-radius: 20px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #fff;
}

/* الموقع */
.container {
  display: none;
  padding: 20px;
  max-width: 900px;
  margin: auto;
  background: #f0f0f0;
  color: #000;
}

h1 {
  text-align: center;
  color: #000;
  margin-bottom: 20px;
}

form {
  margin-top: 20px;
}

label {
  display: block;
  margin-top: 15px;
  color: #000;
  font-weight: bold;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #aaa;
  outline: none;
  background: #fff;
  color: #000;
  box-sizing: border-box;
}

button {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  background: #000;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

#main img {
  display: block;
  margin: 0 auto 20px auto;
  max-width: 250px;
  border-radius: 15px;
}

/* تجاوب الجوال */
@media (max-width: 600px) {
  body { font-size: 14px; }
  #loader img, #main img { max-width: 150px; }
  .bar { width: 90%; }
}
</style>
</head>

<script>
// شاشة التحميل
let i = 0;
let percent = document.getElementById("percent");
let fill = document.getElementById("fill");

let interval = setInterval(() => {
  i++;
  percent.innerText = i + "%";
  fill.style.width = i + "%";

  if(i >= 100){
    clearInterval(interval);
    document.getElementById("loader").style.display = "none";
    document.getElementById("main").style.display = "block";
  }
}, 20);

// إرسال النموذج لديسكورد
const form = document.getElementById('applicationForm');
const webhookURL = "ضع رابط Webhook هنا"; // ضع رابط Webhook هنا

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const data = {};
  form.querySelectorAll('input, textarea').forEach((el,i)=>{
    data[`Q${i+1}`] = el.value || "-";
  });

  let content = " **نموذج تقديم Shadow CIA**\n\n";
  for(let key in data){
    content += `**${key} :** ${data[key]}\n`;
  }

  await fetch(webhookURL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({content})
  });

  alert("تم إرسال التقديم بنجاح!");
  form.reset();
});
</script>
